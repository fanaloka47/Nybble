<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0F1115"/>

  <!-- 2×2 bit grid, checkerboard (1 0 / 0 1) -->
  <!-- Cell size 160px, gap 16px, total grid 336px, offset 88px to center -->

  <!-- top-left: ON -->
  <rect x="88"  y="88"  width="160" height="160" rx="24" fill="#818CF8"/>

  <!-- top-right: OFF -->
  <rect x="264" y="88"  width="160" height="160" rx="24" fill="none" stroke="#818CF8" stroke-width="10" opacity="0.35"/>

  <!-- bottom-left: OFF -->
  <rect x="88"  y="264" width="160" height="160" rx="24" fill="none" stroke="#818CF8" stroke-width="10" opacity="0.35"/>

  <!-- bottom-right: ON -->
  <rect x="264" y="264" width="160" height="160" rx="24" fill="#818CF8"/>
</svg>
